<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1a1815"/>
      <stop offset="100%" stop-color="#2a2520"/>
    </linearGradient>
    <linearGradient id="paper" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#faf5e9"/>
      <stop offset="100%" stop-color="#ebe2d0"/>
    </linearGradient>
  </defs>
  <rect width="512" height="512" rx="96" fill="url(#bg)"/>
  <!-- Notebook -->
  <g transform="translate(96, 88)">
    <rect x="8" y="16" width="304" height="336" rx="6" fill="#8b1e1e" opacity="0.35"/>
    <rect width="304" height="336" rx="6" fill="url(#paper)"/>
    <!-- Binding holes -->
    <circle cx="24" cy="44" r="6" fill="#1a1815" opacity="0.15"/>
    <circle cx="24" cy="100" r="6" fill="#1a1815" opacity="0.15"/>
    <circle cx="24" cy="156" r="6" fill="#1a1815" opacity="0.15"/>
    <circle cx="24" cy="212" r="6" fill="#1a1815" opacity="0.15"/>
    <circle cx="24" cy="268" r="6" fill="#1a1815" opacity="0.15"/>
    <circle cx="24" cy="324" r="6" fill="#1a1815" opacity="0.15"/>
    <!-- Lines -->
    <line x1="64" y1="80" x2="272" y2="80" stroke="#d6c9ad" stroke-width="2"/>
    <line x1="64" y1="128" x2="240" y2="128" stroke="#d6c9ad" stroke-width="2"/>
    <line x1="64" y1="176" x2="256" y2="176" stroke="#d6c9ad" stroke-width="2"/>
    <line x1="64" y1="224" x2="208" y2="224" stroke="#d6c9ad" stroke-width="2"/>
    <line x1="64" y1="272" x2="248" y2="272" stroke="#d6c9ad" stroke-width="2"/>
    <!-- Checkmark (accent) -->
    <circle cx="84" cy="80" r="14" fill="none" stroke="#5a6e3a" stroke-width="3"/>
    <polyline points="76,80 82,86 92,74" fill="none" stroke="#5a6e3a" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>
    <circle cx="84" cy="128" r="14" fill="none" stroke="#1a1815" stroke-width="3" opacity="0.6"/>
    <circle cx="84" cy="176" r="14" fill="none" stroke="#8b1e1e" stroke-width="3"/>
  </g>
  <!-- Decorative accent dot -->
  <circle cx="416" cy="120" r="20" fill="#b8842a"/>
</svg>
